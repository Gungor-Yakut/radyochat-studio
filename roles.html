<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yetki Yönetimi - Filiz Yeşili FM</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0b; color: #fff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #141416; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a1a1c; padding: 15px; color: #00f2ff; text-align: left; border-bottom: 2px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #1f1f21; }
        .perm-check { width: 20px; height: 20px; cursor: pointer; accent-color: #00f2ff; }
        .role-name { font-weight: bold; color: #ffbc00; }
        button { background: #00f2ff; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; float: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 RÜTBE YETKİ AYARLARI</h2>
    <p style="font-size: 12px; color: #888;">Hangi rütbenin hangi işlemleri yapabileceğini buradan belirleyin.</p>
    
    <table>
        <thead>
            <tr>
                <th>Rütbe</th>
                <th>Mesaj Silme</th>
                <th>Düzenleme Modu</th>
                <th>Admin Paneli</th>
                <th>Nick Değiştirme</th>
                <th>Renkli Yazma</th>
            </tr>
        </thead>
        <tbody id="roles-body"></tbody>
    </table>
    <br>
    <button onclick="savePermissions()">DEĞİŞİKLİKLERİ KAYDET</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBeMsSLTbpmjzd7HrVKjhFIVAQ_goJsLUg",
        authDomain: "flat-chat-fa830.firebaseapp.com",
        databaseURL: "https://flat-chat-fa830-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "flat-chat-fa830",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const roles = ["Kurucu", "Admin", "Yönetici", "Teknik Servis", "Dj", "Üye", "Misafir"];
    const perms = ["canDeleteMsgs", "canEditLayout", "canAccessAdmin", "canChangeNick", "canUseColors"];

    // Mevcut yetkileri yükle
    db.ref('permissions').once('value', s => {
        const data = s.val() || {};
        const tbody = document.getElementById('roles-body');
        
        roles.forEach(role => {
            const tr = document.createElement('tr');
            let html = `<td class="role-name">${role}</td>`;
            
            perms.forEach(p => {
                const isChecked = (data[role] && data[role][p]) ? 'checked' : '';
                // Kurucu her zaman tam yetkili (isteğe bağlı kilitlenebilir)
                const isDisabled = role === "Kurucu" ? "disabled checked" : "";
                html += `<td><input type="checkbox" class="perm-check" data-role="${role}" data-perm="${p}" ${isChecked} ${isDisabled}></td>`;
            });
            
            tr.innerHTML = html;
            tbody.appendChild(tr);
        });
    });

    function savePermissions() {
        const updates = {};
        document.querySelectorAll('.perm-check').forEach(check => {
            const role = check.dataset.role;
            const perm = check.dataset.perm;
            if(!updates[role]) updates[role] = {};
            updates[role][perm] = check.checked;
        });

        db.ref('permissions').set(updates).then(() => {
            alert("Yetkiler başarıyla güncellendi!");
            location.reload();
        });
    }
</script>
</body>
</html>
