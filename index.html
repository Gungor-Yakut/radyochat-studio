<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Filiz Yeşili FM - v47.5</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/draggabilly@3/dist/draggabilly.pkgd.min.js"></script>
</head>
<body id="main-body">

<div id="toast">AYARLAR KAYDEDİLDİ</div>

<div id="login-modal" class="modal-overlay">
    <div class="modal-box">
        <h2 style="color:#00f2ff; margin-bottom:20px;">SİSTEME GİRİŞ</h2>
        <input type="text" id="nick-input" placeholder="Nickinizi yazın..." style="width:100%; padding:10px; margin-bottom:15px; background:#000; border:1px solid #333; color:#fff;">
        <button onclick="confirmLogin()" style="width:100%; padding:12px; background:#00f2ff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">GİRİŞ YAP</button>
    </div>
</div>

<div id="context-menu">
    <div onclick="setEditMode('move')">✥ TAŞIMA MODU</div>
    <div onclick="setEditMode('resize')">⤗ BOYUTLANDIRMA MODU</div>
    <div onclick="saveAndLock()" style="color:#00f2ff; border-top:1px solid #333;">✔ KAYDET VE KİLİTLE</div>
    <div onclick="clearMsgs()" style="color:#ff4b2b;">🗑 MESAJLARI TEMİZLE</div>
</div>

<div class="main-stage">
    <div class="widget" id="login-widget"><div id="auth-btn" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; color:#00f2ff;" onclick="handleAuth()">GİRİŞ YAP</div></div>
    
    <div class="widget" id="chat-widget"><div id="chat-window"></div></div>
    
    <div class="widget" id="tools-widget">
        <div class="mini-tools">
            <div id="current-color-btn" style="background:#00f2ff;" onclick="togglePanel('color-dropdown')"></div>
            <div id="color-dropdown">
                <div class="color-grid">
                    <div class="grid-dot" style="background:#ffffff" onclick="applyColor('#ffffff')"></div>
                    <div class="grid-dot" style="background:#000000" onclick="applyColor('#000000')"></div>
                    <div class="grid-dot" style="background:#00007f" onclick="applyColor('#00007f')"></div>
                    <div class="grid-dot" style="background:#009300" onclick="applyColor('#009300')"></div>
                    <div class="grid-dot" style="background:#ff0000" onclick="applyColor('#ff0000')"></div>
                    <div class="grid-dot" style="background:#7f0000" onclick="applyColor('#7f0000')"></div>
                    <div class="grid-dot" style="background:#9c009c" onclick="applyColor('#9c009c')"></div>
                    <div class="grid-dot" style="background:#fc7f00" onclick="applyColor('#fc7f00')"></div>
                    <div class="grid-dot" style="background:#ffff00" onclick="applyColor('#ffff00')"></div>
                    <div class="grid-dot" style="background:#00fc00" onclick="applyColor('#00fc00')"></div>
                    <div class="grid-dot" style="background:#009393" onclick="applyColor('#009393')"></div>
                    <div class="grid-dot" style="background:#00ffff" onclick="applyColor('#00ffff')"></div>
                    <div class="grid-dot" style="background:#0000fc" onclick="applyColor('#0000fc')"></div>
                    <div class="grid-dot" style="background:#ff00ff" onclick="applyColor('#ff00ff')"></div>
                    <div class="grid-dot" style="background:#7f7f7f" onclick="applyColor('#7f7f7f')"></div>
                    <div class="grid-dot" style="background:#d2d2d2" onclick="applyColor('#d2d2d2')"></div>
                </div>
                <button onclick="document.getElementById('adv-picker').click()" style="width:100%; padding:5px; background:#222; border:1px solid #444; color:#fff; font-size:10px; margin-top:5px;">+ ÖZEL RENK</button>
                <input type="color" id="adv-picker" style="display:none" oninput="applyColor(this.value)">
            </div>

            <button onclick="togglePanel('emoji-dropdown')">😊</button>
            <div id="emoji-dropdown"><div class="emoji-grid" id="emoji-list"></div></div>

            <button id="btn-bold" onclick="toggleStyle('bold')">B</button>
            <button id="btn-italic" onclick="toggleStyle('italic')">I</button>
            
            <button onclick="changeFontSize(2)">+</button>
            <button onclick="changeFontSize(-2)">-</button>
            <span id="fs-indicator">14px</span>
        </div>
    </div>

    <div class="widget" id="input-widget"><input type="text" id="msg" placeholder="Önce giriş yapın..." disabled></div>
    <div class="widget" id="online-widget"><div id="user-list"></div></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBeMsSLTbpmjzd7HrVKjhFIVAQ_goJsLUg",
        authDomain: "flat-chat-fa830.firebaseapp.com",
        databaseURL: "https://flat-chat-fa830-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "flat-chat-fa830",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const adminNick = "Filiz";

    let myName = sessionStorage.getItem("filiz_chat_nick") || "";
    let isVerified = false, isEditMode = false, draggies = [], isBold = false, isItalic = false;
    let currentColor = "#00f2ff", fontSize = 14, messageListener = null;
    const widgetIds = ['chat-widget', 'input-widget', 'online-widget', 'login-widget', 'tools-widget'];
    const emojis = ['😊','😂','😍','😎','🤔','😮','😢','😡','👍','👎','🔥','❤️','✨','⭐','✅','❌','🎧','📻','🎵','🎶','📢','💬','⚡','🌈'];

    window.onload = () => { 
        initEmojis();
        loadLayout(); 
        loadUsers(); 
        if(myName) startAuth(); else showLocked(); 
    };

    function initEmojis() {
        const el = document.getElementById('emoji-list');
        emojis.forEach(e => {
            const div = document.createElement('div');
            div.className = 'emoji-item';
            div.innerText = e;
            div.onclick = () => {
                const msgInp = document.getElementById('msg');
                msgInp.value += e;
                msgInp.focus();
                document.getElementById('emoji-dropdown').style.display = 'none';
            };
            el.appendChild(div);
        });
    }

    function togglePanel(id) {
        if(isEditMode) return;
        const target = document.getElementById(id);
        const otherId = (id === 'color-dropdown') ? 'emoji-dropdown' : 'color-dropdown';
        document.getElementById(otherId).style.display = 'none';
        target.style.display = (target.style.display === 'flex') ? 'none' : 'flex';
    }

    // GÜNCELLENEN KISIM: Sadece yerel ekranı etkiler
    function changeFontSize(delta) {
        if(isEditMode) return;
        fontSize = Math.max(10, Math.min(30, fontSize + delta));
        document.getElementById('fs-indicator').innerText = fontSize + "px";
        
        // Mevcut tüm mesajların boyutunu anında güncelle
        const allMsgs = document.querySelectorAll('.chat-msg-row');
        allMsgs.forEach(m => m.style.fontSize = fontSize + "px");
    }

    function startAuth() {
        const uRef = db.ref('presence/' + myName);
        db.ref('users/' + myName).on('value', s => {
            const d = s.val() || {};
            isVerified = d.isVerified || (myName === adminNick);
            const msgInp = document.getElementById('msg');
            const authBtn = document.getElementById('auth-btn');
            authBtn.innerText = "ÇIKIŞ YAP";
            authBtn.style.color = "#ff4b2b";
            if(isVerified) {
                msgInp.disabled = false;
                msgInp.placeholder = "Mesaj yazın...";
                loadMessages();
            } else {
                msgInp.disabled = true;
                msgInp.placeholder = "Onay bekleniyor...";
            }
            uRef.set({ name: myName, color: currentColor, isVerified: isVerified });
            uRef.onDisconnect().remove();
        });
    }

    function applyColor(c) {
        currentColor = c;
        document.getElementById('current-color-btn').style.background = c;
        document.getElementById('color-dropdown').style.display = 'none';
        if(myName) db.ref('presence/' + myName).update({ color: c });
    }

    function toggleStyle(t) { 
        if(isEditMode) return;
        if(t==='bold') { isBold = !isBold; document.getElementById('btn-bold').classList.toggle('active-tool'); }
        if(t==='italic') { isItalic = !isItalic; document.getElementById('btn-italic').classList.toggle('active-tool'); }
    }

    // GÜNCELLENEN KISIM: Gelen mesajı yerel boyutta (fontSize) gösterir
    function loadMessages() {
        if(messageListener) return;
        const win = document.getElementById('chat-window');
        win.innerHTML = "";
        messageListener = db.ref('messages').limitToLast(50).on('child_added', s => {
            const d = s.val();
            const m = document.createElement('div');
            m.className = "chat-msg-row"; // CSS kontrolü için class ekledik
            m.style.cssText = `color:${d.c}; font-weight:${d.b?'bold':'normal'}; font-style:${d.i?'italic':'normal'}; font-size:${fontSize}px; margin-bottom:8px;`;
            m.innerHTML = `<b>${d.u}:</b> ${d.m}`;
            win.prepend(m);
        });
    }

    function loadUsers() {
        db.ref('presence').on('value', s => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            s.forEach(u => {
                const ud = u.val();
                const div = document.createElement('div');
                div.className = "online-user " + (ud.isVerified ? "" : "unverified");
                div.style.color = ud.color || "#00f2ff";
                let cb = (myName === adminNick && ud.name !== adminNick) ? `<input type="checkbox" onchange="verify('${ud.name}', this.checked)" ${ud.isVerified?'checked':''}>` : "";
                div.innerHTML = `${cb} ● ${ud.name}`;
                list.appendChild(div);
            });
        });
    }

    function verify(t, v) { db.ref('users/' + t).update({ isVerified: v }); }

    window.oncontextmenu = (e) => {
        if(myName !== adminNick) return;
        e.preventDefault();
        const m = document.getElementById('context-menu');
        m.style.display = 'block'; m.style.left = e.clientX + 'px'; m.style.top = e.clientY + 'px';
    };

    window.onclick = () => document.getElementById('context-menu').style.display = 'none';

    function setEditMode(type) {
        isEditMode = true;
        document.getElementById('main-body').className = "edit-mode-active mode-" + type;
        draggies.forEach(d => d.destroy()); draggies = [];
        widgetIds.forEach(id => {
            const el = document.getElementById(id);
            if(type === 'move') {
                const d = new Draggabilly(el);
                d.on('dragEnd', function() { 
                    db.ref('layout/'+id).update({ x: this.position.x, y: this.position.y }); 
                    el.style.transform="none"; el.style.left=this.position.x+"px"; el.style.top=this.position.y+"px";
                });
                draggies.push(d);
            }
            if(type === 'resize') {
                const ro = new ResizeObserver(() => { if(isEditMode) db.ref('layout/'+id).update({ w: el.offsetWidth, h: el.offsetHeight }); });
                ro.observe(el);
            }
        });
    }

    function saveAndLock() { document.getElementById('toast').style.display="block"; setTimeout(()=>location.reload(), 1000); }
    function loadLayout() { db.ref('layout').once('value', s => { const d = s.val() || {}; widgetIds.forEach(id => { const el = document.getElementById(id); if(d[id]) { el.style.left=d[id].x+"px"; el.style.top=d[id].y+"px"; el.style.width=d[id].w+"px"; el.style.height=d[id].h+"px"; } }); }); }
    function showLocked() { document.getElementById('chat-window').innerHTML = "<div style='padding:20px; text-align:center; color:#ff4b2b; font-size:12px;'>⚠️ Sohbet Kilitli.</div>"; }
    function handleAuth() { if(myName) { if(confirm("Çıkış?")) { sessionStorage.removeItem("filiz_chat_nick"); location.reload(); } } else { document.getElementById('login-modal').style.display='flex'; } }
    function confirmLogin() { const v = document.getElementById('nick-input').value.trim(); if(v) { sessionStorage.setItem("filiz_chat_nick", v); location.reload(); } }
    function clearMsgs() { if(confirm("Temizle?")) db.ref('messages').remove(); }
    db.ref('messages').on('child_removed', () => document.getElementById('chat-window').innerHTML = "");

    // GÜNCELLENEN KISIM: 's: fontSize' veritabanına gönderilmiyor
    document.getElementById('msg').onkeypress = (e) => {
        if(e.key === "Enter" && isVerified && e.target.value.trim() !== "") {
            db.ref('messages').push().set({ 
                u: myName, 
                m: e.target.value, 
                c: currentColor, 
                b: isBold, 
                i: isItalic 
                // s (size) bilgisini sildik
            });
            e.target.value = "";
        }
    };
</script>
</body>
</html>
